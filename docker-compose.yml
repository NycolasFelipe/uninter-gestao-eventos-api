services:
  db:
    image: mysql:8.4
    container_name: uninter-eventos-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-uninter_eventos}
      MYSQL_USER: ${DB_USER:-uninter}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: uninter-eventos-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: ${PORT:-3000}
      SECRET: ${SECRET:-dev-secret}
      ADMIN_FIXED_TOKEN: ${ADMIN_FIXED_TOKEN:-dev-admin-token}
      DB_NAME: ${DB_NAME:-uninter_eventos}
      DB_HOST: db
      DB_USER: ${DB_USER:-uninter}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      DB_PORT: 3306
    ports:
      - "${PORT:-3000}:3000"

volumes:
  db_data:
